spring.application.name=Tonin-Api

# Perfil activo (dev por defecto, cambiar a prod en producción)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- BASE DE DATOS ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tonindb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE ---
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT ---
jwt.secret=${JWT_SECRET:clave-secreta-de-desarrollo-cambiar-en-produccion-minimo-256-bits!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}

# --- CORS ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# --- WASABI / S3 ---
wasabi.access-key=${WASABI_ACCESS_KEY}
wasabi.secret-key=${WASABI_SECRET_KEY}
wasabi.bucket-name=${WASABI_BUCKET_NAME:sunat-consultas}
wasabi.region=${WASABI_REGION:us-west-1}
wasabi.endpoint=${WASABI_ENDPOINT:https://s3.us-west-1.wasabisys.com}
wasabi.folder=${WASABI_FOLDER:tonin-api}

# --- UPLOAD ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- SWAGGER ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
