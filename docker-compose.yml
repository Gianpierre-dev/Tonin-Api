services:
  db:
    image: postgres:17-alpine
    container_name: tonin-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tonindb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tonin-api
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-tonindb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      WASABI_ACCESS_KEY: ${WASABI_ACCESS_KEY}
      WASABI_SECRET_KEY: ${WASABI_SECRET_KEY}
      WASABI_BUCKET_NAME: ${WASABI_BUCKET_NAME:-sunat-consultas}
      WASABI_REGION: ${WASABI_REGION:-us-west-1}
      WASABI_ENDPOINT: ${WASABI_ENDPOINT:-https://s3.us-west-1.wasabisys.com}
      WASABI_FOLDER: ${WASABI_FOLDER:-tonin-api}
    depends_on:
      db:
        condition: service_healthy

networks:
  default:
    name: tonin-network
